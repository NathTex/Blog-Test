<!DOCTYPE html> <!-- Déclare au navigateur qu'il s'agit d'un document HTML5 moderne -->
<html lang="fr"> <!-- Définit la langue (important pour les lecteurs d'écran et le SEO) -->
<head>
    <meta charset="UTF-8"> <!-- Permet d'afficher correctement les accents (é, à, etc.) -->
    <title>Mon Blog Test</title> <!-- Le titre qui s'affiche dans l'onglet du navigateur -->
    <link rel="stylesheet" href="style.css"> <!-- Relie le fichier CSS pour le design -->
</head>
<body>
    <header> <!-- Section d'en-tête du site -->
        <h1>Mon Blog de Test</h1> <!-- Titre principal du site -->
        <nav><a href="index.html">Accueil</a></nav> <!-- Barre de navigation -->
    </header>

    <main id="liste-articles"> <!-- Zone principale. L'ID permet au JS de savoir où écrire -->
        <!-- Ce texte sera effacé dès que le JavaScript aura chargé les vrais articles -->
        <p>Chargement des articles...</p> 
    </main>

    <script src="script.js"></script> <!-- Charge le fichier JS. On le met à la fin pour ne pas ralentir l'affichage -->
</body>
</html>
